name: AutoGram Pipeline

on:
  schedule:
    # Setiap 2 hari sekali, jam 08:00 WIB (01:00 UTC)
    - cron: '0 1 */2 * *'
  workflow_dispatch:  # Bisa dijalankan manual dari GitHub
  repository_dispatch:
    types: [manual_run]  # Trigger dari Telegram Bot via Cloudflare Worker

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data images

      - name: Run AutoGram Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_SESSION: ${{ secrets.IG_SESSION }}
          NICHE_OVERRIDE: ${{ github.event.client_payload.niche }}
        run: python -m core.pipeline